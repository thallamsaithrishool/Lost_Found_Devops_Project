name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Backend install only (no run to avoid crash)
      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      # Frontend install
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # Frontend build
      - name: Build frontend
        working-directory: frontend
        run: npm run build
